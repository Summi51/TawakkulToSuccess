<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pen</title>
    <style>
        .loading {
            width: 50px;
            height: 50px;
            animation: samreenSpin 1s linear infinite;
            border-top: 2px solid red;
            border-radius: 50%;
        }

        @keyframes samreenSpin {
            from {
                transform: rotate(0deg)
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="loading"></div>
</body>

</html>

<!-- What is @keyframes?

1.
@keyframes tells the browser:

"These are the steps of my animation."

@keyframes animationName {

}
animationName - any name choose

2. 
Define the animation: 

@keyframes spin{

    from{
        transform: rotate(0deg);
    }

    to{
        transform: rotate(360deg);
    }

}

 Start 0° ,  End 360°

3. Apply the animation

animation Property==

animation: animation-name duration timing-function iteration-count;

animation-name - samreenSpin
duration - 1s, s, 3s
timing-function - linear,  ease ease-in, ease-out, ease-in-out
iteration-count - 
1. Repeat forever: 1s linear infinite
2. runs once - animation: spin 1s;
3. Runs forever - spin 1s infinite;

//====
Move Left → Right - translateX(0); translateX(300px);
Grow - scale(1), scale(2);
Fade - opacity:0, opacity:1;
bounce - Notice we used percentages instead of from and to. -->
